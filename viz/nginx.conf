server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Enable SharedArrayBuffer for DuckDB-WASM multi-threading
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Embedder-Policy require-corp always;

    location /data/ {
        add_header Cache-Control "public, max-age=3600";
        add_header Cross-Origin-Resource-Policy cross-origin always;
        add_header Cross-Origin-Opener-Policy same-origin always;
        add_header Cross-Origin-Embedder-Policy require-corp always;
    }

    # Proxy PMXT parquet files from R2 — enables DuckDB-WASM range reads
    location /pmxt/ {
        proxy_pass https://r2.pmxt.dev/;
        proxy_ssl_server_name on;
        proxy_set_header Host r2.pmxt.dev;
        proxy_set_header User-Agent "prediction-market-backtesting/1.0";
        proxy_buffering off;
        proxy_request_buffering off;

        # Pass through range request headers for DuckDB parquet reads
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_pass_header Accept-Ranges;
        proxy_pass_header Content-Range;

        # COEP-compatible headers
        add_header Cross-Origin-Opener-Policy same-origin always;
        add_header Cross-Origin-Embedder-Policy require-corp always;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # gzip for html, json, and text assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/html application/json application/javascript application/octet-stream image/svg+xml;
}
